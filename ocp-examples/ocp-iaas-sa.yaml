apiVersion: v1
kind: ServiceAccount
metadata:
  name: ocp-iaas
  namespace: ocp-iaas

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ocp-iaas
rules:
  - apiGroups:
      - k8s.cni.cncf.io
    resources:
      - network-attachment-definitions
    verbs:
      - list
      - get
      - view
  - apiGroups:
      - '*'
    resources:
      - namespaces
    verbs:
      - list
      - get
      - view

---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: ocp-iaas
subjects:
  - kind: ServiceAccount
    name: ocp-iaas
    namespace: ocp-iaas
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ocp-iaas

