<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWX Login - LDAP Authentication</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    /* Dark mode transitions for smooth theme switching */
    body, .main-container {
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    /* Dark mode body and main container */
    body.dark {
      background-color: #111827 !important;
    }
    
    body.dark .main-container {
      background-color: #1F2937 !important;
    }
    
    /* Dark mode form elements */
    body.dark input, body.dark select, body.dark textarea {
      background-color: #374151 !important;
      border-color: #4B5563 !important;
      color: #F9FAFB !important;
    }
    
    body.dark input:read-only, body.dark select:read-only {
      background-color: #1F2937 !important;
      color: #9CA3AF !important;
    }
    
    body.dark .placeholder-gray-400::placeholder {
      color: #9CA3AF !important;
    }
    
    body.dark .bg-gray-100 {
      background-color: #374151 !important;
    }
    
    body.dark .border {
      border-color: #4B5563 !important;
    }
    
    body.dark label {
      color: #D1D5DB !important;
    }
    
    body.dark h1, body.dark h2, body.dark h3 {
      color: #F9FAFB !important;
    }
    
    body.dark .text-gray-600 {
      color: #9CA3AF !important;
    }
    
    body.dark .text-gray-700 {
      color: #D1D5DB !important;
    }
    
    body.dark .text-gray-800 {
      color: #F9FAFB !important;
    }
    
    body.dark .text-gray-500 {
      color: #9CA3AF !important;
    }
    
    /* Dark mode for error messages */
    body.dark .bg-red-100 {
      background-color: #7F1D1D !important;
    }
    
    body.dark .border-red-400 {
      border-color: #DC2626 !important;
    }
    
    body.dark .text-red-700 {
      color: #FCA5A5 !important;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <!-- Theme buttons positioned at top right corner of page -->
  <div class="fixed top-4 right-4 flex items-center space-x-2 z-10">
    <button id="darkModeToggle" class="bg-gray-700 hover:bg-gray-800 text-gray-200 px-3 py-2 rounded text-sm font-medium transition duration-150 ease-in-out shadow-md">
      🌙 Dark
    </button>
    <button id="resetTheme" class="bg-gray-100 dark:bg-gray-600 hover:bg-gray-200 dark:hover:bg-gray-500 text-gray-600 dark:text-gray-300 px-2 py-2 rounded text-xs transition duration-150 ease-in-out shadow-md" title="Follow system theme">
      🔄
    </button>
  </div>
  
  <div class="main-container bg-white p-10 rounded-xl shadow-lg w-full max-w-md mx-auto">
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">AWX OCP Basebuild</h1>
      <p class="text-gray-600">Please login with your credentials</p>
    </div>
    
    <!-- Error message display -->
    <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
      <span class="block sm:inline">Invalid username or password. Please try again.</span>
    </div>
    
    <form action="/login" method="POST" class="space-y-6">
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          required 
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          placeholder="Enter your username"
          autocomplete="username"
        >
      </div>
      
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          required 
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          placeholder="Enter your password"
          autocomplete="current-password"
        >
      </div>
      
      <div>
        <button 
          type="submit" 
          class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150 ease-in-out"
        >
          <svg class="hidden animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" id="loadingIcon">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span id="buttonText">Sign In</span>
        </button>
      </div>
    </form>
    
    <div class="mt-6 text-center">
      <p class="text-xs text-gray-500">
        Contact UNIX if you need assistance with your account.
      </p>
    </div>
  </div>

  <script>
    // Show error message if there's an error parameter in URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error')) {
      document.getElementById('errorMessage').classList.remove('hidden');
    }
    
    // Handle form submission with loading state
    document.querySelector('form').addEventListener('submit', function() {
      const button = document.querySelector('button[type="submit"]');
      const buttonText = document.getElementById('buttonText');
      const loadingIcon = document.getElementById('loadingIcon');
      
      // Show loading state
      button.disabled = true;
      buttonText.textContent = 'Signing In...';
      loadingIcon.classList.remove('hidden');
    });
    
    // Focus username field on page load
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('username').focus();
      initDarkMode();
    });

    // Dark mode functionality
    function initDarkMode() {
      const darkModeToggle = document.getElementById('darkModeToggle');
      const resetTheme = document.getElementById('resetTheme');
      const body = document.body;
      
      function updateThemeDisplay(isDark, isSystemControlled = false) {
        if (isDark) {
          body.classList.add('dark');
          darkModeToggle.innerHTML = '☀️ Light';
          // Style button as "light mode" button when in dark mode
          darkModeToggle.className = 'bg-gray-100 hover:bg-gray-200 text-gray-800 px-3 py-2 rounded text-sm font-medium transition duration-150 ease-in-out shadow-md';
        } else {
          body.classList.remove('dark');
          darkModeToggle.innerHTML = '🌙 Dark';
          // Style button as "dark mode" button when in light mode
          darkModeToggle.className = 'bg-gray-700 hover:bg-gray-800 text-gray-200 px-3 py-2 rounded text-sm font-medium transition duration-150 ease-in-out shadow-md';
        }
        
        // Update reset button appearance based on whether following system
        if (isSystemControlled) {
          resetTheme.style.opacity = '0.5';
          resetTheme.title = 'Following system theme';
        } else {
          resetTheme.style.opacity = '1';
          resetTheme.title = 'Reset to follow system theme';
        }
      }
      
      // Check for saved dark mode preference, otherwise use browser/system preference
      let isDarkMode = localStorage.getItem('darkMode');
      let isSystemControlled = isDarkMode === null;
      
      if (isSystemControlled) {
        // No saved preference, use browser/system preference
        isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      } else {
        // Use saved preference
        isDarkMode = isDarkMode === 'true';
      }
      
      // Apply the theme
      updateThemeDisplay(isDarkMode, isSystemControlled);
      
      // Listen for system theme changes
      if (window.matchMedia) {
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        mediaQuery.addEventListener('change', function(e) {
          // Only auto-switch if user hasn't manually set a preference
          if (localStorage.getItem('darkMode') === null) {
            updateThemeDisplay(e.matches, true);
          }
        });
      }
      
      // Toggle dark mode manually
      darkModeToggle.addEventListener('click', function() {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        
        // Save preference (this overrides system preference)
        localStorage.setItem('darkMode', isDark);
        updateThemeDisplay(isDark, false);
      });
      
      // Reset to system theme
      resetTheme.addEventListener('click', function() {
        // Remove saved preference to follow system theme
        localStorage.removeItem('darkMode');
        
        // Apply system theme
        const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        updateThemeDisplay(systemDark, true);
      });
    }
  </script>
</body>
</html>
